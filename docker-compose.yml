services:
  valkey:
    image: valkey/valkey
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    ports:
      - 6333:6333
  frontend:
    build: ./client
    ports:
      - "3000:3000"
    # Docker looks inside the client folder for these variables
    env_file:
      - ./client/.env.local
    restart: always

  api:
    build: ./server
    command: node index.js
    ports:
      - "8000:8000"
    # Docker looks inside the server folder for these variables
    env_file:
      - ./server/.env
    environment:
      - QDRANT_URL=http://qdrant:6333 # Tell the API to look for the service name
      - VALKEY_URL=redis://valkey:6379 # Same for your cache
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      - valkey
      - qdrant
    restart: always

  worker:
    build: ./server
    command: node worker.js
    env_file:
      - ./server/.env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - VALKEY_URL=redis://valkey:6379
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      - valkey
      - qdrant
    restart: always
